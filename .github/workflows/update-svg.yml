name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches: [main]
    paths-ignore:
      - 'dark_mode.svg'      # don't retrigger on the svg commit itself
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG with live stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_svg.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg
          git diff --staged --quiet || (git commit -m "chore: update github stats [skip actions]" && git push)
